services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: interview_db
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: gospod_krabs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your_user -d your_django_db"]
      interval: 5s
      retries: 5

  # MongoDB Database
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      retries: 5

  # Django Web App
  django_web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # Modbus and TLS Server
  weather_server:
    build: .
    command: python weather_server.py 
    depends_on:
      mongodb:
        condition: service_healthy

  # Modbus Poller and TLS Client
  weather_client:
    build: .
    command: python weather_client.py
    depends_on:
      weather_server:
        condition: service_started

  # MQTT broker, publisher, client
  mqtt_broker:
    image: eclipse-mosquitto:2
    ports:
      - "8883:8883" # TLS MQTT
    volumes:
      - ./mosquitto_config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto_config/certs:/mosquitto/config/certs
      - ./mosquitto_config/mosquitto.passwd:/mosquitto/config/mosquitto.passwd

  mqtt_publisher:
    build: .
    command: python coingecko_publisher.py
    environment:
      - MQTT_BROKER=mqtt_broker  # Docker routes this to the Mosquitto container!
    depends_on:
      - mqtt_broker

  mqtt_subscriber:
    build: .
    command: python mongo_subscriber.py
    environment:
      - MQTT_BROKER=mqtt_broker
      - MONGO_URI=mongodb://mongodb:27017/ # If this script also saves to Mongo
    depends_on:
      - mqtt_broker